<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::content}, ~{::styles}, ~{::scripts})}">
<head>
    <th:block th:fragment="styles"></th:block>
</head>
<body>
<th:block th:fragment="content">

    <div style="min-height: 70vh; display: flex; align-items: center; justify-content: center; padding: 3rem;">
        <div style="text-align: center; max-width: 500px;">
            <div style="font-family: var(--font-display); font-size: 8rem; font-weight: 700; color: var(--verde-selva); line-height: 1; margin-bottom: 1rem; opacity: 0.20;">404</div>
            <h1 style="font-family: var(--font-display); font-size: 2rem; font-weight: 700; margin-bottom: 0.75rem;"
                th:text="${title} ?: 'Página no encontrada'">Página no encontrada</h1>
            <p style="color: var(--text-secondary); margin-bottom: 2rem;">
                Lo sentimos, la página que buscas no existe o fue eliminada.
            </p>
            <div style="display: flex; gap: 1rem; justify-content: center;">
                <a th:href="@{/}" class="btn btn-primary">
                    <i class="bi bi-house"></i> Volver al inicio
                </a>
                <a th:href="@{/contacto}" class="btn btn-secondary">
                    <i class="bi bi-envelope"></i> Contacto
                </a>
            </div>
        </div>
    </div>

</th:block>
<th:block th:fragment="scripts"></th:block>
</body>
</html>
