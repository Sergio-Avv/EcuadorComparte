<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::content}, ~{::styles}, ~{::scripts})}">
<head>
    <th:block th:fragment="styles">
        <style>
            .news-hero {
                background: linear-gradient(135deg, var(--azul) 0%, var(--azul-medio) 100%);
                padding: 4rem 0;
                color: var(--blanco);
                text-align: center;
            }

            .news-hero h1 {
                font-family: var(--font-display);
                font-size: 2.5rem;
                font-weight: 700;
                margin-bottom: 0.75rem;
            }

            .news-hero p { font-size: 1rem; opacity: 0.80; }

            .news-section { padding: 5rem 0; }

            .news-grid {
                display: grid;
                grid-template-columns: repeat(3, 1fr);
                gap: 1.75rem;
            }

            .news-card img {
                width: 100%;
                height: 210px;
                object-fit: cover;
                transition: transform 0.4s ease;
            }

            .news-card:hover img { transform: scale(1.04); }

            .news-card { overflow: hidden; }

            .news-img-wrapper {
                overflow: hidden;
                height: 210px;
                background: linear-gradient(135deg, var(--azul), var(--azul-medio));
                display: flex;
                align-items: center;
                justify-content: center;
            }

            .news-card-meta {
                display: flex;
                align-items: center;
                gap: 0.75rem;
                margin-bottom: 0.75rem;
                flex-wrap: wrap;
            }

            .news-date { font-size: 0.78rem; color: var(--text-secondary); }

            .news-empty {
                text-align: center;
                padding: 5rem 0;
                color: var(--text-secondary);
            }

            .news-empty i { font-size: 3rem; margin-bottom: 1rem; display: block; opacity: 0.40; }

            @media (max-width: 768px) {
                .news-grid { grid-template-columns: 1fr; }
            }
        </style>
    </th:block>
</head>
<body>
<th:block th:fragment="content">

    <div class="news-hero">
        <div class="container animate">
            <h1><i class="bi bi-newspaper"></i> Noticias</h1>
            <p>Mantente informado sobre nuestras actividades y novedades.</p>
        </div>
    </div>

    <section class="news-section">
        <div class="container">
            <div th:if="${newsList == null or newsList.isEmpty()}" class="news-empty">
                <i class="bi bi-newspaper"></i>
                <h3>No hay noticias publicadas aún.</h3>
                <p>Vuelve pronto para ver las últimas novedades.</p>
            </div>
            <div class="news-grid" th:if="${newsList != null and !newsList.isEmpty()}">
                <div class="card news-card animate" th:each="news : ${newsList}">
                    <div class="news-img-wrapper">
                        <img th:if="${news.imageUrl != null and !news.imageUrl.isEmpty()}"
                             th:src="${news.imageUrl}" th:alt="${news.title}"
                             onerror="this.style.display='none'"/>
                        <i th:if="${news.imageUrl == null or news.imageUrl.isEmpty()}"
                           class="bi bi-newspaper"
                           style="font-size: 3rem; color: rgba(255,255,255,0.30);"></i>
                    </div>
                    <div class="card-body">
                        <div class="news-card-meta">
                            <span class="badge badge-success">
                                <i class="bi bi-circle-fill" style="font-size: 0.5rem;"></i> Publicado
                            </span>
                            <span class="news-date"
                                  th:text="${#temporals.format(news.publishedAt, 'dd MMM yyyy')}"></span>
                        </div>
                        <h3 class="card-title" th:text="${news.title}">Título</h3>
                        <p class="card-text" th:text="${news.summary}">Resumen</p>
                        <a th:href="@{/noticias/{id}(id=${news.id})}" class="btn btn-secondary btn-sm"
                           style="margin-top: 1rem;">
                            Leer más <i class="bi bi-arrow-right"></i>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </section>

</th:block>
<th:block th:fragment="scripts"></th:block>
</body>
</html>
