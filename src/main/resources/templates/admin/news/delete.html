<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::content}, ~{::styles}, ~{::scripts})}">
<head>
    <th:block th:fragment="styles"></th:block>
</head>
<body>
<th:block th:fragment="content">

    <div class="page-header">
        <div class="container">
            <h1><i class="bi bi-trash-fill"></i> Eliminar Noticia</h1>
            <p>Confirma la eliminación de esta noticia.</p>
        </div>
    </div>

    <div class="container" style="padding-bottom: 3rem;">
        <div style="max-width: 550px; margin: 0 auto;">
            <div class="card">
                <div class="card-body" style="padding: 2.5rem; text-align: center;">
                    <div style="width: 64px; height: 64px; background: rgba(192,57,43,0.12); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.25rem; font-size: 1.8rem; color: var(--rojo);">
                        <i class="bi bi-exclamation-triangle-fill"></i>
                    </div>
                    <h3 style="font-family: var(--font-display); font-size: 1.3rem; margin-bottom: 0.5rem;">¿Eliminar esta noticia?</h3>
                    <p style="color: var(--text-secondary); font-size: 0.92rem; margin-bottom: 1.5rem;">
                        Esta acción no se puede deshacer. Se eliminará la noticia
                        <strong th:text="${news.title}">Título</strong>.
                    </p>
                    <div style="display: flex; gap: 1rem; justify-content: center;">
                        <a th:href="@{/admin/news}" class="btn btn-secondary">
                            <i class="bi bi-x"></i> Cancelar
                        </a>
                        <form th:action="@{/admin/news/{id}(id=${news.id})}" method="post">
                            <input type="hidden" name="_method" value="DELETE"/>
                            <button type="submit" class="btn btn-danger">
                                <i class="bi bi-trash"></i> Sí, eliminar
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

</th:block>
<th:block th:fragment="scripts"></th:block>
</body>
</html>
